services:

  dns:
    build:
      context: ./powerdns
      dockerfile: Dockerfile
    container_name: DNSISP
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks:
      - Enterprise
    ipv4_address: 192.168.0.10
    volumes:
      - ./powerdns/pdns.conf:/etc/powerdns/pdns.conf
      - ./powerdns/zones:/etc/powerdns/zones
    environment:
      - PDNS_daemon=yes
      - PDNS_guardian=yes
    restart: unless-stopped

  proxy:
    image: nginx:latest
    container_name: proxyISP
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - Enterprise
    depends_on:
      - site
      - nextcloud

  site:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: site-ISP
    networks:
      - Enterprise
    ipv4_address: 192.168.0.30

  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: email-ISP
    ports:
      - "25:25/tcp"
      - "587:587/tcp"
      - "110:110/tcp"
      - "143:143/tcp"
      - "993:993/tcp"
      - "995:995/tcp"
    networks:
      - Enterprise
    ipv4_address: 192.168.0.40
    volumes:
      - ./email/postfix/main.cf:/etc/postfix/main.cf
      - ./email/postfix/master.cf:/etc/postfix/master.cf
      - ./email/postfix/sasl/conf:/etc/postfix/sasl/conf
      - ./email/dovecot/10-auth.conf:/etc/dovecot/conf.d/10-auth.conf
      - ./email/dovecot/10-mail.conf:/etc/dovecot/conf.d/10-mail.conf
      - ./email/dovecot/10-master.conf:/etc/dovecot/conf.d/10-master.conf
      - ./email/dovecot/10-ssl.conf:/etc/dovecot/conf.d/10-ssl.conf
      - ./email/mail.sh:/usr/local/bin/mail.sh
      - ./email/home:/home
      - ./email/mailname:/etc/mailname

  nextcloud:
    image: nextcloud:latest
    container_name: webmailISP
    networks:
      - Enterprise
    ipv4_address: 192.168.0.50
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_pass
      - NEXTCLOUD_TRUSTED_DOMAINS=webmail.isp.local,nexustech.com.br,webmail.nexustech
    volumes:
      - ./webmail/data:/var/www/html/data
      - ./webmail/config:/var/www/html/config
    depends_on:
      nextcloud-db:
        condition: service_healthy

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db
    networks:
      - Enterprise
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
    volumes:
      - ./webmail/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nextcloud", "-pnextcloud_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  Enterprise:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.0.0/24