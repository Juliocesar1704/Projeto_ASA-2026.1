services:

  dns:
    image: powerdns/pdns-auth-47:latest
    container_name: DNSISP
    ports:
      - "53:53/tcp"
      - "53:53/udp"
     # - "8081:8081"  # API do PowerDNS (opcional)
    networks:
      - Enterprise
    volumes:
      - ./powerdns/pdns.conf:/etc/powerdns/pdns.conf
      - ./powerdns/zones:/etc/powerdns/zones
    environment:
      - PDNS_daemon=yes
      - PDNS_guardian=yes
      #- PDNS_api=yes
      #- PDNS_api_key=seu_apikey_aqui
     # - PDNS_webserver=yes
     # - PDNS_webserver_address=0.0.0.0
     # - PDNS_webserver_port=8081
    restart: unless-stopped

  proxy:
    image: nginx:latest
    container_name: proxyISP
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - Enterprise

  site:
    image: nginx:latest
    container_name: nomedositenaodefinidoISP
    volumes:
      - ./web/nomedositenaodefinido:/usr/share/nginx/html
    networks:
      - Enterprise

  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: email-ISP
    ports:
      - "25:25/tcp"
      - "587:587/tcp"
      - "110:110/tcp"
      - "143:143/tcp"
      - "993:993"
      - "995:995"
    networks:
      - Enterprise
    volumes:
      - ./email/postfix/main.cf:/etc/postfix/main.cf
      - ./email/dovecot/10-auth.conf:/etc/dovecot/conf.d/10-auth.conf
      - ./email/dovecot/10-mail.conf:/etc/dovecot/conf.d/10-mail.conf
      - ./email/dovecot/10-master.conf:/etc/dovecot/conf.d/10-master.conf
      - ./email/dovecot/10-ssl.conf:/etc/dovecot/conf.d/10-ssl.conf
      - ./email/mail.sh:/usr/local/bin/mail.sh
      
  nextcloud:                              
    image: nextcloud:latest
    container_name: webmailISP
    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_pass
      - NEXTCLOUD_TRUSTED_DOMAINS=webmail.isp.local
    volumes:
      - ./webmail/data:/var/www/html/data
      - ./webmail/config:/var/www/html/config
    networks:
      - Enterprise
    depends_on:
      - nextcloud-db

  nextcloud-db:                            
    image: mariadb:10.11
    container_name: nextcloud-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
    volumes:
      - ./webmail/db:/var/lib/mysql
    networks:
      - Enterprise

networks:
  Enterprise:
    driver: bridge