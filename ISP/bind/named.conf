http local {
    endpoints { "/dns-query"; };
};

options {

    directory "/var/cache/bind";

    listen-on { any; };
    listen-on-v6 { any; };

    listen-on tls ephemeral { any; };
    listen-on-v6 tls ephemeral { any; };

    listen-on tls ephemeral http local { any; };
    listen-on-v6 tls ephemeral http local { any; };

    allow-query { any; };

    recursion yes;
    allow-recursion { any; };

    forwarders {
        8.8.8.8;
        1.1.1.1;
    };

    dnssec-validation no;
};

zone "nexustech.com.br" {
    type master;
    file "/etc/bind/nexustech.conf";
};