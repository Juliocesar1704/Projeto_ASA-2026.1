$TTL 86400
@   IN  SOA ns.nexustech.com.br. root.nexustech.com.br. (
        2026061402 ; Serial (ano/mês/dia/versão)
        3600       ; Refresh
        1800       ; Retry
        1209600    ; Expire
        86400 )    ; Minimum TTL

@    IN  NS  ns.nexustech.com.br.

; Servidor DNS
ns     IN  A   192.168.0.10

; Proxy reverso
proxy   IN  A   192.168.0.20

; Site principal
site    IN  A   192.168.0.30
www     IN  CNAME site

; Servidor de e-mail
mail    IN  A   192.168.0.40
@       IN  MX 10 mail.nexustech.com.br.

; Webmail (Nextcloud)
webmail IN  A   192.168.0.50

; Registros adicionais para serviços
imap    IN  CNAME mail
pop     IN  CNAME mail
smtp    IN  CNAME mail
