upstream portal_backend {
    server portal-cliente3:80;
}

upstream cms_backend {
    server cms-app-cliente3:80;
}

# ==================================================
# PORTAL PRINCIPAL
# ==================================================

server {

    listen 80;
    server_name cliente3.com.br www.cliente3.com.br;

    access_log /var/log/nginx/portal.access.log;
    error_log /var/log/nginx/portal.error.log;

    location / {

        proxy_pass http://portal_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}

# ==================================================
# CMS CLIENTE 3
# ==================================================

server {

    listen 80;
    server_name cms.cliente3.com.br;

    access_log /var/log/nginx/cms.access.log;
    error_log /var/log/nginx/cms.error.log;

    location / {

        proxy_pass http://cms_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}