services:

  proxy-c1:
    image: nginx:latest
    container_name: proxy-cliente1
    restart: unless-stopped
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - isp_net
      - cliente1_net

  portal-c1:
    build:
      context: ./portal
    container_name: portal-cliente1
    restart: unless-stopped
    networks:
      - cliente1_net

  hotsite-c1:
    build:
      context: ./hotsite
    container_name: hotsite-cliente1
    restart: unless-stopped
    networks:
      - cliente1_net

  sign-db-c1:
    image: postgres:15-alpine
    container_name: sign-db-cliente1
    restart: unless-stopped
    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbuserpass123
      POSTGRES_DB: docsign_db
    volumes:
      - sign_db_data_c1:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d docsign_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - cliente1_net

  sign-api-c1:
    image: salesfilho/sign-api:latest
    container_name: sign-api-cliente1
    restart: unless-stopped

    environment:
      DB_HOST: sign-db-cliente1
      DB_PORT: 5432
      DB_USER: dbuser
      DB_PASSWORD: dbuserpass123
      DB_NAME: docsign_db

    depends_on:
      sign-db-c1:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - cliente1_net

  sign-app-c1:
    image: salesfilho/sign-app:latest
    container_name: sign-app-cliente1
    restart: unless-stopped

    environment:
      API_BASE_URL: https://sign.salesfilho.com.br/api

    depends_on:
      sign-api-c1:
        condition: service_healthy

    networks:
      - cliente1_net

volumes:
  sign_db_data_c1:

networks:

  isp_net:
    external: true

  cliente1_net:
    driver: bridge