networks:
  isp_net:
    external: true
  cliente1_net:

services:
  proxy-cliente1:
    image: nginx:latest
    restart: unless-stopped
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - isp_net
      - cliente1_net

  portal-cliente1:
    build:
      context: ./portal
    restart: unless-stopped
    networks:
      - cliente1_net

  hotsite-cliente1:
    build:
      context: ./hotsite
    restart: unless-stopped
    networks:
      - cliente1_net

  sign-db-cliente1:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbuserpass123
      POSTGRES_DB: docsign_db
    volumes:
      - ./sign/postgres_data:/var/lib/postgresql/data
    networks:
      - cliente1_net

  sign-api-cliente1:
    image: salesfilho/sign-api:latest
    restart: unless-stopped
    environment:
      DB_HOST: sign-db-cliente1
      DB_PORT: 5432
      DB_USER: dbuser
      DB_PASSWORD: dbuserpass123
      DB_NAME: docsign_db
    depends_on:
      - sign-db-cliente1
    networks:
      - cliente1_net

  sign-app-cliente1:
    image: salesfilho/sign-app:latest
    restart: unless-stopped
    environment:
      API_BASE_URL: http://sign-api-cliente1:8000/api
    depends_on:
      - sign-api-cliente1
    networks:
      - cliente1_net
