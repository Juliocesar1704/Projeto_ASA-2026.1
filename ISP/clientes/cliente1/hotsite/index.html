<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Filho - Campanha de Assinatura Digital</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #e0e0e0;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            color: #1e3c72;
            background-color: #ffffff;
            border: none;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            background-color: #f0f0f0;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #b0c4de;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sales Filho Assinaturas</h1>
        <p>Experimente a forma mais rápida, segura e sustentável de assinar seus documentos eletronicamente. Economize tempo e elimine a burocracia papelada de forma definitiva.</p>
        <a href="http://sign.salesfilho.com.br" class="btn">Acessar o Assinador</a>
        <div class="footer">
            &copy; 2026 Sales Filho S.A. - Todos os direitos reservados.
        </div>
    </div>
</body>
</html>
