# ==================================================
# CLIENTE 1 - CONFIGURAÇÃO COM RESOLUÇÃO DINÂMICA
# (Evita falhas de inicialização do Nginx se containers estiverem offline)
# ==================================================

# ==================================================
# PORTAL PRINCIPAL
# ==================================================

server {

    listen 80;
    server_name salesfilho.com.br www.salesfilho.com.br;

    access_log /var/log/nginx/portal.access.log;
    error_log /var/log/nginx/portal.error.log;

    resolver 127.0.0.11 valid=10s;

    location / {

        set $portal_target portal-cliente1;
        proxy_pass http://$portal_target:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}

# ==================================================
# APP SALES FILHO
# ==================================================

