# ==================================================
# SIGN - ASSINATURA DE DOCUMENTOS
# ==================================================

server {

    listen 80;
    server_name sign.salesfilho.com.br;

    access_log /var/log/nginx/sign.access.log;
    error_log /var/log/nginx/sign.error.log;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=10s;

    # Roteamento da API para o backend
    location /api/ {

        set $api_target sign-api-cliente1;
        proxy_pass http://$api_target:8000/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_request_buffering off;

    }

    # Frontend da aplicacao Sign
    location / {

        set $app_target sign-app-cliente1;
        proxy_pass http://$app_target:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_request_buffering off;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}