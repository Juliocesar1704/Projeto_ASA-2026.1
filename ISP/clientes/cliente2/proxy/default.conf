upstream portal_backend {
    server portal-cliente2:80;
}

upstream hotsite_backend {
    server hotsite-cliente2:80;
}

upstream sign_app_backend {
    server sign-app-cliente2:80;
}

upstream sign_api_backend {
    server sign-api-cliente2:8000;
}

# ==================================================
# PORTAL PRINCIPAL
# ==================================================

server {

    listen 80;
    server_name cliente2.com.br www.cliente2.com.br;

    access_log /var/log/nginx/portal.access.log;
    error_log /var/log/nginx/portal.error.log;

    location / {

        proxy_pass http://portal_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}

# ==================================================
# APP CLIENTE 2
# ==================================================

server {

    listen 80;
    server_name app.cliente2.com.br;

    access_log /var/log/nginx/app.access.log;
    error_log /var/log/nginx/app.error.log;

    location / {

        proxy_pass http://hotsite_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}

# ==================================================
# SIGN - ASSINATURA DE DOCUMENTOS
# ==================================================

server {

    listen 80;
    server_name sign.cliente2.com.br;

    access_log /var/log/nginx/sign.access.log;
    error_log /var/log/nginx/sign.error.log;

    client_max_body_size 100M;

    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;
    proxy_read_timeout 3600;

    # Roteamento da API para o backend
    location /api/ {

        proxy_pass http://sign_api_backend/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_request_buffering off;

    }

    # Frontend da aplicacao Sign
    location / {

        proxy_pass http://sign_app_backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        proxy_buffering off;
        proxy_request_buffering off;

    }

    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }

}