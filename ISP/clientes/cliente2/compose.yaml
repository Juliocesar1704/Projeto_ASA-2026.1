services:

  proxy-c2:
    image: nginx:latest
    container_name: proxy-cliente2
    restart: unless-stopped
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - isp_net
      - cliente2_net

  portal-c2:
    build:
      context: ./portal
    container_name: portal-cliente2
    restart: unless-stopped
    networks:
      - cliente2_net

  cms-db-c2:
    image: mariadb:10.11
    container_name: cms-db-cliente2
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass_cliente2
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=wordpress_pass_cliente2
    volumes:
      - cms_db_data_c2:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wordpress", "-pwordpress_pass_cliente2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cliente2_net

  cms-app-c2:
    image: wordpress:latest
    container_name: cms-app-cliente2
    restart: unless-stopped
    environment:
      - WORDPRESS_DB_HOST=cms-db-cliente2
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress_pass_cliente2
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - cms_app_data_c2:/var/www/html
    depends_on:
      cms-db-c2:
        condition: service_healthy
    networks:
      - cliente2_net

volumes:
  cms_db_data_c2:
  cms_app_data_c2:

networks:
  isp_net:
    external: true
  cliente2_net:
    driver: bridge