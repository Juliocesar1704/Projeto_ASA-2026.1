services:

  proxy:
    image: nginx:latest
    container_name: proxy-cliente2
    restart: unless-stopped
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - isp_net
      - cliente2_net

  portal:
    build:
      context: ./portal
    container_name: portal-cliente2
    restart: unless-stopped
    networks:
      - cliente2_net

  hotsite:
    build:
      context: ./hotsite
    container_name: hotsite-cliente2
    restart: unless-stopped
    networks:
      - cliente2_net

  sign-db:
    image: postgres:15-alpine
    container_name: sign-db-cliente2
    restart: unless-stopped
    environment:
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbuserpass123
      POSTGRES_DB: docsign_db
    volumes:
      - ./sign/postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbuser -d docsign_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - cliente2_net

  sign-api:
    image: salesfilho/sign-api:latest
    container_name: sign-api-cliente2
    restart: unless-stopped

    environment:
      DB_HOST: sign-db-cliente2
      DB_PORT: 5432
      DB_USER: dbuser
      DB_PASSWORD: dbuserpass123
      DB_NAME: docsign_db

    depends_on:
      sign-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - cliente2_net

  sign-app:
    image: salesfilho/sign-app:latest
    container_name: sign-app-cliente2
    restart: unless-stopped

    environment:
      API_BASE_URL: http://sign-api-cliente2:8000/api

    depends_on:
      sign-api:
        condition: service_healthy

    networks:
      - cliente2_net

networks:

  isp_net:
    external: true

  cliente2_net:
    driver: bridge