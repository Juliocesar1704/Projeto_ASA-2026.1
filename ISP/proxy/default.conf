# Upstream definitions
upstream portal_backend {
    server site-ISP:80;
}

upstream nextcloud_backend {
    server webmailISP:80;
}

upstream cliente1_proxy {
    server proxy-cliente1:80;
}

# ==================================================
# REDIRECIONAMENTO HTTP PARA HTTPS (GLOBAL)
# ==================================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ==================================================
# PORTAL NEXUSTECH (HTTPS)
# ==================================================
server {
    listen 443 ssl;
    server_name nexustech.com.br www.nexustech.com.br;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://portal_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ==================================================
# WEBMAIL (HTTPS)
# ==================================================
server {
    listen 443 ssl;
    server_name webmail.nexustech.com.br;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10G;
    proxy_read_timeout 3600;
    proxy_connect_timeout 3600;
    proxy_send_timeout 3600;

    location / {
        proxy_pass http://nextcloud_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}

# ==================================================
# CLIENTE 1 - TODOS OS SUBDOMINIOS (HTTPS)
# ==================================================
server {
    listen 443 ssl;
    server_name salesfilho.com.br *.salesfilho.com.br;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 100M;
    resolver 127.0.0.11 valid=10s;

    location / {
        set $upstream_target proxy-cliente1;
        proxy_pass http://$upstream_target:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3600;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
    }
}

