services:

  dns:
    build:
      context: ./powerdns
      dockerfile: Dockerfile
    container_name: DNSISP
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./powerdns/pdns.conf:/etc/powerdns/pdns.conf
      - ./powerdns/zones:/etc/powerdns/zones
      - ./clientes:/etc/powerdns/clientes
    environment:
      - PDNS_daemon=yes
      - PDNS_guardian=yes
    networks:
      - isp_net
    restart: unless-stopped


  proxy:
    image: nginx:latest
    container_name: proxyISP
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - site
      - nextcloud
    networks:
      - isp_net
    restart: unless-stopped


  site:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: site-ISP
    networks:
      - isp_net
    restart: unless-stopped


  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: email-ISP

    ports:
      - "25:25" # SMTP
      - "465:465" # SMTP SSL
      - "587:587" # SMTP Submission
      - "110:110" # POP3
      - "143:143" # IMAP
      - "993:993" # IMAP SSL
      - "995:995" # POP3 SSL

    volumes:
      - ./email/postfix/main.cf:/etc/postfix/main.cf
      - ./email/postfix/master.cf:/etc/postfix/master.cf
      - ./email/postfix/sasl/conf:/etc/postfix/sasl/conf

      - ./email/dovecot/10-auth.conf:/etc/dovecot/conf.d/10-auth.conf
      - ./email/dovecot/10-mail.conf:/etc/dovecot/conf.d/10-mail.conf
      - ./email/dovecot/10-master.conf:/etc/dovecot/conf.d/10-master.conf
      - ./email/dovecot/10-ssl.conf:/etc/dovecot/conf.d/10-ssl.conf
      - ./email/dovecot/auth-passwdfile.conf.ext:/etc/dovecot/conf.d/auth-passwdfile.conf.ext
      - ./email/dovecot/30-lmtp.conf:/etc/dovecot/conf.d/30-lmtp.conf
      - ./email/dovecot/users:/etc/dovecot/users

      - ./email/mail.sh:/usr/local/bin/mail.sh
      - ./email/mailname:/etc/mailname

      - email_data:/var/mail/vhosts

    networks:
      - isp_net
    restart: unless-stopped


  nextcloud:
    image: nextcloud:34-apache
    container_name: webmailISP

    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
      - NEXTCLOUD_TRUSTED_DOMAINS=webmail.nexustech.com.br localhost

    volumes:
      - nextcloud_data:/var/www/html/data
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps

    depends_on:
      nextcloud-db:
        condition: service_healthy

    networks:
      - isp_net

    restart: unless-stopped

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db

    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass

    volumes:
      - nextcloud_db:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nextcloud", "-pnextcloud_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - isp_net

    restart: unless-stopped


volumes:
  email_data:
  nextcloud_data:
  nextcloud_config:
  nextcloud_apps:
  nextcloud_db:

networks:
  isp_net:
    external: true
    name: isp_net

    #Comando para executar todos os serviços: docker compose -f ISP/compose.yaml -f ISP/clientes/cliente1/compose.yaml -f ISP/clientes/cliente2/compose.yaml -f ISP/clientes/cliente3/compose.yaml up -d