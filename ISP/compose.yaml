services:

  dns:
    build:
      context: ./powerdns
      dockerfile: Dockerfile
    container_name: DNSISP
    ports:
      - "5354:53/tcp"
      - "5354:53/udp"
    volumes:
      - ./powerdns/pdns.conf:/etc/powerdns/pdns.conf
      - ./powerdns/zones:/etc/powerdns/zones
    environment:
      - PDNS_daemon=yes
      - PDNS_guardian=yes
    networks:
      - isp_net
    restart: unless-stopped


  proxy:
    image: nginx:latest
    container_name: proxyISP
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - site
      - nextcloud
    networks:
      - isp_net
    restart: unless-stopped


  site:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: site-ISP
    networks:
      - isp_net
    restart: unless-stopped


  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: email-ISP

    ports:
      - "25:25" # SMTP
      - "465:465" # SMTP SSL
      - "587:587" # SMTP Submission
      - "110:110" # POP3
      - "143:143" # IMAP
      - "993:993" # IMAP SSL
      - "995:995" # POP3 SSL

    volumes:
      - ./email/postfix/main.cf:/etc/postfix/main.cf
      - ./email/postfix/master.cf:/etc/postfix/master.cf
      - ./email/postfix/sasl/conf:/etc/postfix/sasl/conf

      - ./email/dovecot/10-auth.conf:/etc/dovecot/conf.d/10-auth.conf
      - ./email/dovecot/10-mail.conf:/etc/dovecot/conf.d/10-mail.conf
      - ./email/dovecot/10-master.conf:/etc/dovecot/conf.d/10-master.conf
      - ./email/dovecot/10-ssl.conf:/etc/dovecot/conf.d/10-ssl.conf

      - ./email/mail.sh:/usr/local/bin/mail.sh
      - ./email/home:/home
      - ./email/mailname:/etc/mailname

    networks:
      - isp_net
    restart: unless-stopped


  nextcloud:
    image: nextcloud:34-apache
    container_name: webmailISP

    environment:
      - MYSQL_HOST=nextcloud-db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_pass
      - NEXTCLOUD_TRUSTED_DOMAINS=webmail.nexustech.com.br

    volumes:
      - ./webmail/data:/var/www/html/data
      - ./webmail/config:/var/www/html/config
      - ./webmail/custom_apps:/var/www/html/custom_apps
      
    depends_on:
      nextcloud-db:
        condition: service_healthy

    networks:
      - isp_net

    restart: unless-stopped

  nextcloud-db:
    image: mariadb:10.11
    container_name: nextcloud-db

    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass

    volumes:
      - ./webmail/db:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_pass || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - isp_net

    restart: unless-stopped


networks:
  isp_net:
    external: true
    name: isp_net