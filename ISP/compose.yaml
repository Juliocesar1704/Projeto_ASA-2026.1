services:
  dns:
    image: internetsystemsconsortium/bind9:9.18
    container_name: DNSISP
    ports:
      - "53:53/tcp" 
      - "53:53/udp"
    volumes:
      - ./bind:/etc/bind
    networks:
      - isp_net
    restart: unless-stopped
    
  proxy:
    image: nginx:latest
    container_name: proxyISP
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - site
     # - nextcloud
    networks:
      - isp_net
    restart: unless-stopped

  site:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: site-ISP
    networks:
      - isp_net
    restart: unless-stopped


  email:
    build:
      context: ./email
      dockerfile: Dockerfile
    container_name: email-ISP

    ports:
      - "2525:25" # SMTP exposto como 2525
      - "4465:465" # SMTP SSL
      - "5587:587" # SMTP Submission
      - "1110:110" # POP3 exposto como 1110
      - "1143:143" # IMAP
      - "9993:993" # IMAP SSL
      - "9995:995" # POP3 SSL

    volumes:
      - ./email/home:/home
      

    networks:
      - isp_net
    restart: unless-stopped


